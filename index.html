<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body class="bg-orange-50 p-4 sm:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        <div class="bg-gradient-to-br from-orange-500 to-orange-700 text-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-orange-200 font-bold uppercase text-xs tracking-widest">Kabupaten Lampung Timur</h2>
            <h1 class="text-4xl font-black">MONITORING 1804</h1>
            <div id="totalProgres" class="text-5xl font-black mt-4 text-orange-100">0%</div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">
                </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">
            <div class="flex gap-2 mb-6">
                <button onclick="loadTable('Kecamatan')" class="bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Kecamatan</button>
                <button onclick="loadTable('Desa')" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg text-sm font-bold">Desa</button>
                <button onclick="loadTable('PETUGAS')" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg text-sm font-bold">Petugas</button>
                <button onclick="loadTable('SLS')" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg text-sm font-bold">SLS</button>
            </div>
            <table id="mainDataTable" class="w-full text-xs"></table>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
