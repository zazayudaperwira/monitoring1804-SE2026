<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Lapangan 1804</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4">
    <div id="loader" class="text-center py-20 font-bold text-blue-600">Memuat Data...</div>
    <div id="dashboardContent" class="hidden space-y-6">
        <div class="bg-blue-800 text-white p-6 rounded-xl shadow-lg">
            <h1 class="text-2xl font-black">KABUPATEN LAMPUNG TIMUR</h1>
            <p id="kabProgres" class="text-3xl font-bold text-emerald-300">0.00%</p>
        </div>
        
        <div class="flex gap-2">
            <select id="filterWilayah" class="border p-2 rounded"><option value="">Semua Kecamatan</option></select>
            <select id="filterAssignment" class="border p-2 rounded"><option value="">Semua Status</option><option value="OPEN">OPEN</option><option value="APPROVED BY Pengawas">APPROVED</option></select>
        </div>

        <div class="h-64 bg-white p-4 rounded shadow"><canvas id="progressChart"></canvas></div>
        <div class="bg-white p-4 rounded shadow overflow-x-auto">
            <table id="mainDataTable" class="display compact w-full"></table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
