<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Progres Lapangan 1804</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        table.dataTable thead th {
            background-color: #f1f5f9; color: #1e293b; font-weight: 700; border-bottom: 2px solid #cbd5e1 !important;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #2563eb !important; color: white !important; border: none !important; border-radius: 0.375rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2.5">
                    <div class="p-2 bg-blue-600 rounded-lg text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                    </div>
                    <span class="text-sm font-bold text-slate-900 tracking-tight uppercase">Tabel Monitoring Progres Berjenjang 1804</span>
                </div>
                <div>
                    <span id="txtLastUpdate" class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full">Sinkronisasi...</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <div id="loader" class="flex flex-col items-center justify-center py-24 bg-white rounded-xl border border-slate-200 shadow-sm space-y-3">
            <div class="w-9 h-9 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs font-medium text-slate-500">Memuat matriks progres wilayah dari Google Sheets API...</p>
        </div>

        <div id="dashboardContent" class="hidden bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
            <div class="overflow-x-auto">
                <table id="tableBerjenjang" class="display cell-border compact stripe w-full text-xs text-slate-700">
                    <thead>
                        <tr>
                            <th>Kecamatan</th>
                            <th>Desa</th>
                            <th>PML</th>
                            <th>PPL</th>
                            <th>Open</th>
                            <th>Draft</th>
                            <th>Submitted Pencacah</th>
                            <th>Rejected Pengawas</th>
                            <th>Approved Pengawas</th>
                            <th>Target Total</th>
                            <th>Progres</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
        
    </main>

    <script src="app.js?v=2.1"></script>
</body>
</html>
