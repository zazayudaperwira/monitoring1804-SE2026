<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring SE2026</title>


<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">


</head>



<body class="bg-orange-50 p-6">


<div class="max-w-7xl mx-auto space-y-6">



<!-- HEADER -->

<div class="bg-orange-800 text-white rounded-3xl p-8 shadow">


<h1 class="text-4xl font-black">
MONITORING SE2026
</h1>


<p id="updateInfo">
Memuat data...
</p>


<div class="mt-4">

Progress Kabupaten

<div id="kabProgres"
class="text-5xl font-black">
0%
</div>


</div>


</div>







<!-- KPI -->

<div class="grid md:grid-cols-4 gap-5">


<div class="bg-white rounded-2xl shadow p-5">

Total SLS

<div id="totalSLS"
class="text-3xl font-bold">
-
</div>

</div>



<div class="bg-white rounded-2xl shadow p-5">

Selesai

<div id="totalDone"
class="text-3xl font-bold">
-
</div>

</div>




<div class="bg-white rounded-2xl shadow p-5">

Progress

<div id="progressCard"
class="text-3xl font-bold">
-
</div>

</div>




<div class="bg-white rounded-2xl shadow p-5">

Status

<div class="text-green-600 text-xl font-bold">

LIVE

</div>


</div>



</div>









<!-- FILTER -->


<div class="bg-white rounded-3xl shadow p-5">


<div class="grid md:grid-cols-3 gap-4">


<select id="fKec"
class="border rounded-xl p-3">

<option value="">
Semua Kecamatan
</option>


</select>




<select id="fDesa"
class="border rounded-xl p-3">


<option value="">
Semua Desa
</option>


</select>




<button onclick="resetFilters()"
class="bg-red-500 text-white rounded-xl">

Reset

</button>


</div>


</div>









<!-- CHART -->

<div class="bg-white rounded-3xl shadow p-6 h-[400px]">


<canvas id="progresChart"></canvas>


</div>









<!-- RANKING 6 CARD -->


<div class="grid md:grid-cols-2 gap-6">






<div class="bg-white rounded-3xl shadow p-6">


<h2 class="font-bold text-green-600 text-xl">

Top 5 Kecamatan

</h2>


<div id="topKecamatan"
class="mt-4">

</div>


</div>







<div class="bg-white rounded-3xl shadow p-6">


<h2 class="font-bold text-blue-600 text-xl">

Top 5 Desa

</h2>


<div id="topDesa"
class="mt-4">

</div>


</div>








<div class="bg-white rounded-3xl shadow p-6">


<h2 class="font-bold text-red-600 text-xl">

Bottom 5 Kecamatan

</h2>


<div id="bottomKecamatan"
class="mt-4">

</div>


</div>







<div class="bg-white rounded-3xl shadow p-6">


<h2 class="font-bold text-red-600 text-xl">

Bottom 5 Desa

</h2>


<div id="bottomDesa"
class="mt-4">

</div>


</div>







<div class="bg-white rounded-3xl shadow p-6">


<h2 class="font-bold text-orange-600 text-xl">

Top 10 Petugas

</h2>


<div id="topPetugas"
class="mt-4">

</div>


</div>








<div class="bg-white rounded-3xl shadow p-6">


<h2 class="font-bold text-gray-600 text-xl">

Bottom 10 Petugas

</h2>


<div id="bottomPetugas"
class="mt-4">

</div>


</div>





</div>









<!-- DATATABLE -->



<div class="bg-white rounded-3xl shadow p-6">


<div class="flex gap-3 mb-5 flex-wrap">


<button onclick="switchTab('Kecamatan')"
class="bg-orange-600 text-white px-5 py-2 rounded-xl">

Kecamatan

</button>



<button onclick="switchTab('Desa')"
class="px-5 py-2 rounded-xl">

Desa

</button>




<button onclick="switchTab('PETUGAS')"
class="px-5 py-2 rounded-xl">

Petugas

</button>




<button onclick="switchTab('SLS')"
class="px-5 py-2 rounded-xl">

SLS

</button>



</div>





<table id="mainTable"
class="w-full">

</table>



</div>







</div>






<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>


<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>



<script src="app.js"></script>



</body>

</html>
