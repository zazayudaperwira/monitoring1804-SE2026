<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Monitoring 1804</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-4 lg:p-8">
    <div id="loader" class="text-center font-bold text-blue-600">Sedang memproses data...</div>
    
    <div id="dashboardContent" class="hidden space-y-6">
        <div class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white p-6 rounded-2xl shadow-xl flex justify-between items-center">
            <div>
                <h2 class="text-blue-200 text-xs font-bold uppercase tracking-widest">Capaian Kab. Lampung Timur</h2>
                <h1 class="text-3xl font-black">MONITORING EVALUASI 1804</h1>
            </div>
            <div id="kabProgres" class="text-4xl font-black text-emerald-300">0.00%</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border h-80">
                <canvas id="progressChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
                <select id="filterWilayah" class="w-full border p-2 rounded-lg text-sm"><option value="">Semua Kecamatan</option></select>
                <select id="filterAssignment" class="w-full border p-2 rounded-lg text-sm"><option value="">Semua Status</option><option value="APPROVED BY Pengawas">APPROVED</option></select>
                <button onclick="showRankings()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-blue-700">Lihat Rank 10 Teratas/Terbawah</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <button onclick="renderTable('Kecamatan')" class="px-4 py-2 bg-slate-200 rounded-lg text-xs font-bold">Kecamatan</button>
                <button onclick="renderTable('Desa')" class="px-4 py-2 bg-slate-200 rounded-lg text-xs font-bold">Desa</button>
                <button onclick="renderTable('PETUGAS')" class="px-4 py-2 bg-slate-200 rounded-lg text-xs font-bold">Petugas</button>
                <button onclick="renderTable('SLS')" class="px-4 py-2 bg-slate-200 rounded-lg text-xs font-bold">SLS</button>
            </div>
            <table id="mainDataTable" class="display w-full text-xs"></table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
