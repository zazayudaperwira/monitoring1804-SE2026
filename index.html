<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring 1804 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        .bg-orange-modern { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); }
    </style>
</head>
<body class="bg-orange-50 font-sans p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        <div class="bg-orange-modern text-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-orange-200 font-bold uppercase text-xs tracking-widest">Kabupaten Lampung Timur</h2>
            <h1 class="text-4xl font-black">MONITORING 1804</h1>
            <div id="totalProgres" class="text-5xl font-black mt-4 text-orange-100">0%</div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">
                <h3 class="font-bold text-orange-700 mb-4">Status Assignment</h3>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">
                <h3 class="font-bold text-orange-700 mb-4">Progres Wilayah</h3>
                <canvas id="progresChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">
            <div class="flex gap-2 mb-6 overflow-x-auto">
                <button onclick="changeTab('Kecamatan')" class="tab-btn bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Kecamatan</button>
                <button onclick="changeTab('Desa')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg text-sm font-bold">Desa</button>
                <button onclick="changeTab('PETUGAS')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg text-sm font-bold">Petugas</button>
                <button onclick="changeTab('SLS')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg text-sm font-bold">SLS</button>
            </div>
            <table id="mainDataTable" class="w-full text-xs"></table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
