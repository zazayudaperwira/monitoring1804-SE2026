<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Data 1804</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        table.dataTable { border-collapse: collapse !important; width: 100% !important; }
        table.dataTable thead th { background-color: #f8fafc; color: #334155; font-weight: 700; border-bottom: 2px solid #e2e8f0 !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: #2563eb !important; color: white !important; border: none !important; border-radius: 0.375rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <span class="text-sm font-bold tracking-wider text-blue-700 uppercase">📊 Dashboard Monitoring Utama 1804</span>
            <span id="txtLastUpdate" class="text-xs text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full font-medium">Syncing...</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
        
        <div id="loader" class="flex flex-col items-center justify-center py-24 bg-white rounded-xl border border-slate-200 space-y-3">
            <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-slate-500 font-medium">Mengunduh data lembar kerja dari Google Sheets...</p>
        </div>

        <div id="dashboardContent" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div>
                        <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider">Grafik Analisis Progres</h3>
                        <p class="text-xs text-slate-400">Pilih sumber data sheet di bawah ini untuk mengubah visualisasi grafik.</p>
                    </div>
                    <select id="filterChartSource" class="text-xs font-semibold bg-slate-100 border border-slate-300 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Kecamatan">Berdasarkan Kecamatan</option>
                        <option value="Desa">Berdasarkan Desa</option>
                        <option value="PETUGAS">Berdasarkan Petugas (PPL)</option>
                    </select>
                </div>
                <div class="h-72 w-full">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="flex border-b border-slate-200 bg-slate-50 p-2 gap-1 overflow-x-auto">
                    <button onclick="switchTab('Kecamatan')" id="btn-Kecamatan" class="tab-btn px-4 py-2 text-xs font-bold rounded-lg bg-blue-600 text-white shadow-sm">Kecamatan</button>
                    <button onclick="switchTab('Desa')" id="btn-Desa" class="tab-btn px-4 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200">Desa</button>
                    <button onclick="switchTab('PETUGAS')" id="btn-PETUGAS" class="tab-btn px-4 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200">Petugas</button>
                    <button onclick="switchTab('SLS')" id="btn-SLS" class="tab-btn px-4 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200">SLS</button>
                </div>

                <div class="p-6 overflow-x-auto">
                    <table id="mainDataTable" class="display cell-border compact stripe w-full text-xs text-slate-700">
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="app.js?v=3.0"></script>
</body>
</html>
