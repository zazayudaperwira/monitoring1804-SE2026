<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring 1804</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body class="bg-orange-50 p-6">
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-orange-600 mb-4"></div>
        <p class="text-orange-700 font-bold">Memuat Data...</p>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-orange-600 text-white p-8 rounded-3xl shadow-xl">
            <h1 class="text-3xl font-black">MONITORING 1804</h1>
            <div id="totalProgres" class="text-4xl font-black mt-2">0%</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="filterKec" class="p-3 rounded-xl border border-orange-200"><option value="">Semua Kecamatan</option></select>
            <select id="filterDesa" class="p-3 rounded-xl border border-orange-200"><option value="">Semua Desa</option></select>
            <select id="filterStatus" class="p-3 rounded-xl border border-orange-200">
                <option value="">Semua Status</option>
                <option value="OPEN">OPEN</option>
                <option value="APPROVED BY Pengawas">APPROVED BY Pengawas</option>
            </select>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
            <div class="flex gap-2 mb-6">
                <button onclick="loadTable('Kecamatan')" class="tab-btn bg-orange-600 text-white px-6 py-2 rounded-lg font-bold">Kecamatan</button>
                <button onclick="loadTable('Desa')" class="tab-btn bg-orange-100 text-orange-700 px-6 py-2 rounded-lg font-bold">Desa</button>
                <button onclick="loadTable('PETUGAS')" class="tab-btn bg-orange-100 text-orange-700 px-6 py-2 rounded-lg font-bold">Petugas</button>
                <button onclick="loadTable('SLS')" class="tab-btn bg-orange-100 text-orange-700 px-6 py-2 rounded-lg font-bold">SLS</button>
            </div>
            <table id="mainDataTable" class="w-full text-xs"></table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
