<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body class="bg-orange-50 p-6">
    <div id="loader" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="w-64 h-4 bg-orange-100 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-orange-600 w-0 transition-all duration-300"></div>
        </div>
        <p class="mt-4 font-bold text-orange-700"><span id="perc">0</span>% Memuat Data...</p>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-gradient-to-r from-orange-600 to-orange-400 p-8 rounded-3xl text-white shadow-lg">
            <h1 class="text-3xl font-black">MONITORING 1804</h1>
            <p id="updateInfo" class="opacity-80"></p>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <select id="fKec" class="p-3 rounded-xl border"><option value="">Pilih Kecamatan</option></select>
            <select id="fDesa" class="p-3 rounded-xl border"><option value="">Pilih Desa</option></select>
            <select id="fStat" class="p-3 rounded-xl border"><option value="">Pilih Status</option></select>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <button onclick="switchTab('Kecamatan')" class="tab-btn bg-orange-600 text-white px-4 py-2 rounded-lg">Kecamatan</button>
                <button onclick="switchTab('Desa')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg">Desa</button>
            </div>
            <table id="mainTable" class="w-full text-xs"></table>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
