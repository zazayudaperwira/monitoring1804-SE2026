<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring 1804 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.tailwindcss.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: #ea580c !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-3 bg-slate-900 p-8 rounded-3xl text-white shadow-2xl">
                <h1 class="text-3xl font-black">MONITORING 1804</h1>
                <p id="updateInfo" class="text-slate-400 mt-2">Memuat data...</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center items-center">
                <span class="text-slate-400 font-bold text-xs uppercase tracking-widest">Progres Kab.</span>
                <div id="kabProgres" class="text-4xl font-black text-orange-600 mt-2">0%</div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border flex gap-4 items-center">
            <select id="fKec" class="flex-1 p-3 bg-slate-50 rounded-xl border-none font-semibold text-sm"></select>
            <select id="fDesa" class="flex-1 p-3 bg-slate-50 rounded-xl border-none font-semibold text-sm"></select>
            <button onclick="resetFilters()" class="px-6 py-3 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-900">RESET</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border h-80">
                <canvas id="progresChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border overflow-hidden">
                <h3 class="font-bold text-slate-700 mb-4 flex justify-between">
                    Ranking Petugas <span>(Top 10 / Bottom 10)</span>
                </h3>
                <div id="rankingPetugas" class="text-xs h-64 overflow-y-auto space-y-2"></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <table id="mainTable" class="w-full text-sm"></table>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
