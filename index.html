<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring 1804</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body class="bg-orange-50 p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <div id="progressContainer" class="w-full bg-gray-200 rounded-full h-2.5">
            <div id="progressBar" class="bg-orange-600 h-2.5 rounded-full" style="width: 0%"></div>
        </div>

        <div class="bg-orange-800 p-8 rounded-3xl text-white shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black">MONITORING 1804</h1>
                <p id="updateInfo" class="opacity-80">Memuat data...</p>
            </div>
            <div class="text-right">
                <p class="text-sm opacity-80">Progres Kab. Lampung Timur</p>
                <div id="kabProgres" class="text-4xl font-black">0%</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="fKec" class="p-3 rounded-xl border"><option value="">Semua Kecamatan</option></select>
            <select id="fDesa" class="p-3 rounded-xl border"><option value="">Semua Desa</option></select>
            <button onclick="resetFilters()" class="bg-red-500 text-white rounded-xl font-bold hover:bg-red-600">RESET FILTER</button>
        </div>

        <div class="bg-white p-6 rounded-3xl border shadow-sm h-96">
            <canvas id="progresChart"></canvas>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <h2 class="font-bold text-green-600 mb-4 text-center">Top 10 Petugas (Tertinggi)</h2>
                <div id="topPetugas" class="text-xs"></div>
            </div>
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <h2 class="font-bold text-red-600 mb-4 text-center">Bottom 10 Petugas (Terendah)</h2>
                <div id="bottomPetugas" class="text-xs"></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <div class="flex gap-2 mb-6 overflow-x-auto">
                <button onclick="switchTab('Kecamatan')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold">Kecamatan</button>
                <button onclick="switchTab('Desa')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold">Desa</button>
                <button onclick="switchTab('PETUGAS')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold">Petugas</button>
                <button onclick="switchTab('SLS')" class="tab-btn bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold">SLS</button>
            </div>
            <table id="mainTable" class="w-full text-xs"></table>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
