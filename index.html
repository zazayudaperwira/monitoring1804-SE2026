<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring SE2026</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
</head>

<body class="bg-slate-100">

<div class="max-w-7xl mx-auto p-6 space-y-6">

<div class="bg-gradient-to-r from-orange-700 to-orange-500 text-white rounded-3xl p-8 shadow-xl">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-black">MONITORING SE2026</h1>
            <p id="updateInfo">Memuat data...</p>
        </div>
        <div class="text-right">
            <p>Progres Kabupaten</p>
            <div id="kabProgres" class="text-5xl font-black">0%</div>
        </div>
    </div>
</div>


<div class="grid md:grid-cols-4 gap-4">
<div class="bg-white rounded-2xl p-5 shadow">
<h3 class="text-gray-500">Total SLS</h3>
<h2 id="totalSLS" class="text-3xl font-bold">-</h2>
</div>

<div class="bg-white rounded-2xl p-5 shadow">
<h3 class="text-gray-500">Selesai</h3>
<h2 id="selesai" class="text-3xl font-bold">-</h2>
</div>

<div class="bg-white rounded-2xl p-5 shadow">
<h3 class="text-gray-500">Target Harian</h3>
<h2 id="target" class="text-3xl font-bold">-</h2>
</div>

<div class="bg-white rounded-2xl p-5 shadow">
<h3 class="text-gray-500">Update</h3>
<h2 class="text-xl font-bold">Live</h2>
</div>
</div>


<div class="bg-white rounded-3xl p-6 shadow">

<div class="grid md:grid-cols-3 gap-3">
<select id="fKec" class="border rounded-xl p-3">
<option value="">Semua Kecamatan</option>
</select>

<select id="fDesa" class="border rounded-xl p-3">
<option value="">Semua Desa</option>
</select>

<button onclick="resetFilters()" 
class="bg-red-500 text-white rounded-xl font-bold">
Reset
</button>
</div>

</div>


<div class="bg-white rounded-3xl p-6 shadow h-[420px]">
<canvas id="progresChart"></canvas>
</div>


<div class="grid md:grid-cols-3 gap-5">

<div class="bg-white rounded-3xl p-5 shadow">
<h2 class="font-bold text-green-600 mb-3">
Top Kecamatan
</h2>
<div id="topKec"></div>
</div>


<div class="bg-white rounded-3xl p-5 shadow">
<h2 class="font-bold text-blue-600 mb-3">
Top Desa
</h2>
<div id="topDesa"></div>
</div>


<div class="bg-white rounded-3xl p-5 shadow">
<h2 class="font-bold text-orange-600 mb-3">
Top PPL
</h2>
<div id="topPetugas"></div>
</div>

</div>


<div class="bg-white rounded-3xl p-6 shadow">

<div class="flex gap-2 mb-5">

<button class="tab-btn px-4 py-2 rounded-xl bg-orange-600 text-white"
onclick="switchTab('Kecamatan')">
Kecamatan
</button>

<button class="tab-btn px-4 py-2 rounded-xl"
onclick="switchTab('Desa')">
Desa
</button>

<button class="tab-btn px-4 py-2 rounded-xl"
onclick="switchTab('PETUGAS')">
PPL
</button>

<button class="tab-btn px-4 py-2 rounded-xl"
onclick="switchTab('SLS')">
SLS
</button>

</div>

<table id="mainTable" class="w-full"></table>

</div>


</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="app.js"></script>

</body>
</html>
