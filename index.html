<!DOCTYPE html>
<html>
<head>
<title>Monitoring SE2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body class="bg-orange-50 p-6">

<div class="max-w-7xl mx-auto space-y-6">

<div class="bg-orange-800 text-white rounded-3xl p-8">
<h1 class="text-4xl font-black">MONITORING SE2026</h1>
<p id="updateInfo"></p>
</div>

<div class="grid md:grid-cols-4 gap-4">
<div class="bg-white rounded-2xl p-5 shadow">Total SLS<h2 id="totalSLS"></h2></div>
<div class="bg-white rounded-2xl p-5 shadow">Selesai<h2 id="totalDone"></h2></div>
<div class="bg-white rounded-2xl p-5 shadow">Progress<h2 id="progressCard"></h2></div>
<div class="bg-white rounded-2xl p-5 shadow">LIVE</div>
</div>

<div class="grid md:grid-cols-2 gap-6">

<div class="bg-white p-5 rounded-3xl shadow"><h2>Top Kecamatan</h2><div id="topKec"></div></div>
<div class="bg-white p-5 rounded-3xl shadow"><h2>Top Desa</h2><div id="topDesa"></div></div>
<div class="bg-white p-5 rounded-3xl shadow"><h2>Top PPL</h2><div id="topPetugas"></div></div>
<div class="bg-white p-5 rounded-3xl shadow"><h2>Bottom PPL</h2><div id="bottomPetugas"></div></div>

</div>

<div class="bg-white rounded-3xl p-5 shadow">
<button onclick="switchTab('Kecamatan')">Kecamatan</button>
<button onclick="switchTab('Desa')">Desa</button>
<button onclick="switchTab('PETUGAS')">PPL</button>
<button onclick="switchTab('SLS')">SLS</button>

<table id="mainTable"></table>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="app.js"></script>
</body>
</html>
