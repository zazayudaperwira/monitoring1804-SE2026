<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring SE2026</title>


<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">


</head>


<body class="bg-orange-50 p-6">


<div class="max-w-7xl mx-auto space-y-6">


<!-- HEADER -->

<div class="bg-orange-800 text-white rounded-3xl p-8 shadow">


<div class="flex justify-between">

<div>

<h1 class="text-4xl font-black">
MONITORING SE2026
</h1>

<p id="updateInfo">
Memuat data...
</p>

</div>


<div class="text-right">

<div class="text-sm">
Progress Kabupaten
</div>


<div id="kabProgres"
class="text-5xl font-black">
0%
</div>


</div>


</div>


</div>





<!-- KPI -->

<div class="grid md:grid-cols-4 gap-5">


<div class="bg-white rounded-2xl p-5 shadow">

<div>Total SLS</div>

<div id="totalSLS"
class="text-3xl font-bold">
-
</div>

</div>



<div class="bg-white rounded-2xl p-5 shadow">

<div>Selesai</div>

<div id="totalDone"
class="text-3xl font-bold">
-
</div>

</div>



<div class="bg-white rounded-2xl p-5 shadow">

<div>Progress</div>

<div id="progressCard"
class="text-3xl font-bold">
-
</div>

</div>



<div class="bg-white rounded-2xl p-5 shadow">

<div>Status</div>

<div class="text-xl font-bold text-green-600">
LIVE
</div>

</div>


</div>





<!-- FILTER -->

<div class="bg-white rounded-3xl p-5 shadow">


<div class="grid md:grid-cols-3 gap-4">


<select id="fKec"
class="border p-3 rounded-xl">

<option value="">
Semua Kecamatan
</option>

</select>




<select id="fDesa"
class="border p-3 rounded-xl">

<option value="">
Semua Desa
</option>

</select>



<button onclick="resetFilters()"
class="bg-red-500 text-white rounded-xl">

Reset

</button>


</div>


</div>






<!-- CHART -->


<div class="bg-white rounded-3xl p-6 shadow h-[420px]">


<canvas id="progresChart"></canvas>


</div>







<!-- RANKING 2 BARIS -->



<div class="grid md:grid-cols-2 gap-6">



<div class="bg-white rounded-3xl shadow p-6">


<h2 class="text-green-600 font-bold text-xl">
Top Kecamatan
</h2>


<div id="topKec"></div>


</div>





<div class="bg-white rounded-3xl shadow p-6">


<h2 class="text-blue-600 font-bold text-xl">
Top Desa
</h2>


<div id="topDesa"></div>


</div>






<div class="bg-white rounded-3xl shadow p-6">


<h2 class="text-orange-600 font-bold text-xl">
Top PPL
</h2>


<div id="topPetugas"></div>


</div>






<div class="bg-white rounded-3xl shadow p-6">


<h2 class="text-red-600 font-bold text-xl">
Bottom PPL
</h2>


<div id="bottomPetugas"></div>


</div>




</div>









<!-- TABLE -->


<div class="bg-white rounded-3xl shadow p-6">


<div class="flex gap-3 mb-5">


<button class="tab-btn bg-orange-600 text-white px-5 py-2 rounded-xl"
onclick="switchTab('Kecamatan')">

Kecamatan

</button>


<button class="tab-btn px-5 py-2 rounded-xl"
onclick="switchTab('Desa')">

Desa

</button>


<button class="tab-btn px-5 py-2 rounded-xl"
onclick="switchTab('PETUGAS')">

PPL

</button>


<button class="tab-btn px-5 py-2 rounded-xl"
onclick="switchTab('SLS')">

SLS

</button>


</div>



<table id="mainTable"
class="w-full">

</table>



</div>



</div>







<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>


<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>


<script src="app.js"></script>


</body>
</html>
